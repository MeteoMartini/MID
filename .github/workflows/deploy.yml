name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: MID bauen
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository laden
        uses: actions/checkout@v6

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm-Netzwerkzugriff absichern
        shell: bash
        run: |
          set -euo pipefail

          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          npm cache verify || true

          echo "npm-Registry:"
          npm config get registry

          echo "npm-Cache:"
          npm config get cache

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        run: |
          set -uo pipefail

          for attempt in 1 2 3; do
            echo "npm-ci-Versuch ${attempt} von 3"

            if npm ci \
              --no-audit \
              --no-fund \
              --prefer-offline \
              --legacy-peer-deps
            then
              echo "npm ci wurde erfolgreich abgeschlossen."
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci ist nach drei Versuchen fehlgeschlagen."
              exit 1
            fi

            wait_seconds=$((attempt * 20))

            echo "Installation fehlgeschlagen."
            echo "Neuer Versuch in ${wait_seconds} Sekunden."

            sleep "$wait_seconds"
          done

      - name: MID für GitHub Pages bauen
        shell: bash
        run: |
          set -euo pipefail
          npm run build
        env:
          VITE_METAR_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}
          VITE_ALERT_PROXY_URL: ${{ vars.VITE_ALERT_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_RADAR_PROXY_URL: ${{ vars.VITE_RADAR_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_WORKER_SAME_ORIGIN_PATH: ${{ vars.VITE_WORKER_SAME_ORIGIN_PATH }}
          VITE_WORKER_FALLBACK_URLS: ${{ vars.VITE_WORKER_FALLBACK_URLS }}

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Produktionsbuild hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: MID veröffentlichen
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub-Pages-Deployment ausführen
        id: deployment
        uses: actions/deploy-pages@v4
