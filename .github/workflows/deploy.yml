name: Deploy to GitHub Pages

on:
  # Normale direkte Änderungen am MID-Projekt weiterhin veröffentlichen.
  push:
    branches:
      - main
    paths-ignore:
      - MID-professional-replacement.zip

  # Nach erfolgreicher Installation der ZIP automatisch veröffentlichen.
  workflow_run:
    workflows:
      - Install MID replacement
    types:
      - completed

  # Manueller Start bleibt möglich.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Aktuellen main-Stand laden
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: MID bauen
        run: npm run build
        env:
          VITE_METAR_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}
          VITE_ALERT_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v5
