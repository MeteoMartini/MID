name: Deploy MID to GitHub Pages
run-name: MID aus main prüfen und veröffentlichen

on:
  push:
    branches:
      - main
    paths-ignore:
      - MID-professional-replacement.zip
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mid-pages
  cancel-in-progress: true

jobs:
  build:
    name: MID prüfen und bauen
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repository laden
        uses: actions/checkout@v6

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Lockfile und npm-Registry prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail

          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 2
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 3000
          npm config set fetch-retry-maxtimeout 15000
          npm config set fetch-timeout 60000

          node <<'NODE'
          const fs = require('node:fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const invalid = [];
          for (const [name, entry] of Object.entries(lock.packages ?? {})) {
            const resolved = entry && typeof entry === 'object' ? entry.resolved : undefined;
            if (typeof resolved !== 'string') continue;
            if (/internal\.api\.openai\.org|applied-caas-gateway|localhost|127\.0\.0\.1/i.test(resolved)) {
              invalid.push(`${name || '(root)'}: ${resolved}`);
            }
          }
          if (invalid.length) {
            console.error('Nicht öffentlich erreichbare Paket-URLs im Lockfile:\n' + invalid.join('\n'));
            process.exit(1);
          }
          console.log('Lockfile enthält keine internen oder lokalen Paket-URLs.');
          NODE

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        timeout-minutes: 6
        run: |
          set -euo pipefail
          npm ci \
            --no-audit \
            --no-fund \
            --prefer-offline \
            --legacy-peer-deps \
            --loglevel=notice

      - name: Produktionsbuild und Regressionstests ausführen
        shell: bash
        timeout-minutes: 15
        env:
          VITE_METAR_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}
          VITE_ALERT_PROXY_URL: ${{ vars.VITE_ALERT_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_RADAR_PROXY_URL: ${{ vars.VITE_RADAR_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_WORKER_SAME_ORIGIN_PATH: ${{ vars.VITE_WORKER_SAME_ORIGIN_PATH }}
          VITE_WORKER_FALLBACK_URLS: ${{ vars.VITE_WORKER_FALLBACK_URLS }}
        run: |
          set -euo pipefail
          npm run verify

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Produktionsbuild hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: MID veröffentlichen
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub-Pages-Deployment ausführen
        id: deployment
        uses: actions/deploy-pages@v5
