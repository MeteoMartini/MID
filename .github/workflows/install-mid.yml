name: Install MID replacement

on:
  push:
    branches:
      - main
    paths:
      - 'MID-professional-replacement*.zip'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mid-install
  cancel-in-progress: false

jobs:
  install:
    name: MID installieren und prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Repository laden
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Release-ZIP auswählen und entpacken
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          mapfile -t archives < <(
            find . -maxdepth 1 -type f \
              -name 'MID-professional-replacement*.zip' \
              -printf '%f\n' | sort
          )

          if [ "${#archives[@]}" -eq 0 ]; then
            echo "::error::Keine MID-Release-ZIP im Repository-Hauptverzeichnis gefunden."
            echo "Erwartet wird z. B. MID-professional-replacement.zip oder MID-professional-replacement(54).zip."
            exit 1
          fi

          if [ "${#archives[@]}" -gt 1 ]; then
            echo "::error::Mehrere MID-Release-ZIPs gefunden. Bitte nur eine ZIP hochladen."
            printf 'Gefunden: %s\n' "${archives[@]}"
            exit 1
          fi

          archive="${archives[0]}"
          echo "Verwendetes Release-Archiv: ${archive}"

          rm -rf /tmp/mid-new
          mkdir -p /tmp/mid-new
          unzip -q "$archive" -d /tmp/mid-new

          if [ ! -f /tmp/mid-new/package.json ]; then
            echo "::error::Die ZIP enthält keine package.json im Hauptverzeichnis."
            exit 1
          fi

          if [ ! -f /tmp/mid-new/package-lock.json ]; then
            echo "::error::Die ZIP enthält keine package-lock.json im Hauptverzeichnis."
            exit 1
          fi

          echo "MID-Archiv wurde erfolgreich geprüft und entpackt."

      - name: Alte MID-Version ersetzen
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='MID-professional-replacement*.zip' \
            /tmp/mid-new/ ./

          rm -f -- MID-professional-replacement*.zip

          echo "MID-Projekt wurde ersetzt."
          echo "Die mitgelieferte package-lock.json bleibt erhalten."

      - name: Lockfile und npm-Netzwerkzugriff prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail

          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 3
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 30000
          npm config set fetch-timeout 60000
          npm cache verify || true

          node <<'NODE'
          const fs = require('node:fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const invalid = [];

          for (const [name, entry] of Object.entries(lock.packages ?? {})) {
            const resolved = entry && typeof entry === 'object' ? entry.resolved : undefined;
            if (typeof resolved !== 'string') continue;
            if (/internal\.api\.openai\.org|applied-caas-gateway|localhost|127\.0\.0\.1/i.test(resolved)) {
              invalid.push(`${name || '(root)'}: ${resolved}`);
            }
          }

          if (invalid.length) {
            console.error('Nicht öffentlich erreichbare Paket-URLs im Lockfile:\n' + invalid.join('\n'));
            process.exit(1);
          }

          console.log('Lockfile enthält keine internen oder lokalen Paket-URLs.');
          NODE

          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "npm-Registry: $(npm config get registry)"
          echo "npm-Cache: $(npm config get cache)"

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        timeout-minutes: 12
        run: |
          set -uo pipefail

          for attempt in 1 2 3; do
            echo "npm-ci-Versuch ${attempt} von 3"

            if timeout --signal=TERM --kill-after=30s 4m \
              npm ci \
                --no-audit \
                --no-fund \
                --prefer-online \
                --legacy-peer-deps
            then
              echo "npm ci wurde erfolgreich abgeschlossen."
              npm ls --depth=0 || true
              exit 0
            fi

            status=$?
            echo "npm ci ist mit Status ${status} fehlgeschlagen."

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci ist nach drei begrenzten Versuchen fehlgeschlagen."
              exit 1
            fi

            wait_seconds=$((attempt * 10))
            echo "Neuer Versuch in ${wait_seconds} Sekunden."
            sleep "$wait_seconds"
          done

      - name: Produktionsbuild ausführen
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail
          timeout --signal=TERM --kill-after=30s 9m npm run build

      - name: Worker-Syntax prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail
          node --check worker/metar-proxy.js

      - name: MID-Regressionstests ausführen
        shell: bash
        timeout-minutes: 20
        run: |
          set -euo pipefail

          TEST_SCRIPTS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.scripts).filter(k=>k.startsWith('test:')).join('\n'))")

          if [ -z "$TEST_SCRIPTS" ]; then
            echo "::error::Keine MID-Regressionstests in package.json gefunden."
            exit 1
          fi

          while IFS= read -r script; do
            [ -z "$script" ] && continue
            echo "===== npm run ${script} ====="
            timeout --signal=TERM --kill-after=15s 3m npm run "$script"
          done <<< "$TEST_SCRIPTS"

      - name: Neue MID-Version committen
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Keine Änderungen vorhanden."
          else
            version=$(node -p "require('./package.json').version")
            git commit -m "Install MID v${version}"
            git push origin HEAD:main
          fi
