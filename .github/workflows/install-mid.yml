name: Install MID replacement

on:
  push:
    branches:
      - main
    paths:
      - MID-professional-replacement.zip

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mid-install
  cancel-in-progress: false

jobs:
  install:
    name: MID installieren und prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Repository laden
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Neue MID-Version entpacken
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          if [ ! -f MID-professional-replacement.zip ]; then
            echo "::error::MID-professional-replacement.zip wurde nicht gefunden."
            exit 1
          fi

          rm -rf /tmp/mid-new
          mkdir -p /tmp/mid-new

          unzip -q MID-professional-replacement.zip -d /tmp/mid-new

          if [ ! -f /tmp/mid-new/package.json ]; then
            echo "::error::Die ZIP enthält keine package.json im Hauptverzeichnis."
            exit 1
          fi

          if [ ! -f /tmp/mid-new/package-lock.json ]; then
            echo "::error::Die ZIP enthält keine package-lock.json im Hauptverzeichnis."
            exit 1
          fi

          echo "MID-Archiv wurde erfolgreich geprüft und entpackt."

      - name: Alte MID-Version ersetzen
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='MID-professional-replacement.zip' \
            /tmp/mid-new/ ./

          rm -f MID-professional-replacement.zip

          echo "MID-Projekt wurde ersetzt."
          echo "Die mitgelieferte package-lock.json bleibt erhalten."

      - name: npm-Netzwerkzugriff absichern
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail

          npm config set fetch-retries 3
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 30000
          npm config set fetch-timeout 60000

          npm cache verify || true

          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "npm-Registry: $(npm config get registry)"
          echo "npm-Cache: $(npm config get cache)"

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        timeout-minutes: 12
        run: |
          set -uo pipefail

          for attempt in 1 2 3; do
            echo "npm-ci-Versuch ${attempt} von 3"

            if timeout --signal=TERM --kill-after=30s 4m \
              npm ci \
                --no-audit \
                --no-fund \
                --prefer-offline \
                --legacy-peer-deps
            then
              echo "npm ci wurde erfolgreich abgeschlossen."
              npm ls --depth=0
              exit 0
            fi

            status=$?
            echo "npm ci ist mit Status ${status} fehlgeschlagen."

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci ist nach drei begrenzten Versuchen fehlgeschlagen."
              exit 1
            fi

            wait_seconds=$((attempt * 10))
            echo "Neuer Versuch in ${wait_seconds} Sekunden."
            sleep "$wait_seconds"
          done

      - name: Produktionsbuild ausführen
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail
          timeout --signal=TERM --kill-after=30s 9m npm run build

      - name: Worker-Syntax prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail
          node --check worker/metar-proxy.js

      - name: MID-Regressionstests ausführen
        shell: bash
        timeout-minutes: 20
        run: |
          set -euo pipefail

          TEST_SCRIPTS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.scripts).filter(k=>k.startsWith('test:')).join('\n'))")

          if [ -z "$TEST_SCRIPTS" ]; then
            echo "::error::Keine MID-Regressionstests in package.json gefunden."
            exit 1
          fi

          while IFS= read -r script; do
            [ -z "$script" ] && continue
            echo "===== npm run ${script} ====="
            timeout --signal=TERM --kill-after=15s 3m npm run "$script"
          done <<< "$TEST_SCRIPTS"

      - name: Neue MID-Version committen
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Keine Änderungen vorhanden."
          else
            git commit -m "Replace MID with professional dashboard"
            git push origin main
          fi
