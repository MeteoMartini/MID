name: Install MID replacement

on:
  push:
    branches:
      - main
    paths:
      - MID-professional-replacement.zip

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mid-install
  cancel-in-progress: true

jobs:
  install:
    name: MID installieren und prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Repository laden
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Neue MID-Version entpacken
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          if [ ! -f MID-professional-replacement.zip ]; then
            echo "::error::MID-professional-replacement.zip wurde nicht gefunden."
            exit 1
          fi

          rm -rf /tmp/mid-new
          mkdir -p /tmp/mid-new

          unzip -q MID-professional-replacement.zip -d /tmp/mid-new

          if [ ! -f /tmp/mid-new/package.json ]; then
            echo "::error::Die ZIP enthält keine package.json im Hauptverzeichnis."
            exit 1
          fi

          if [ ! -f /tmp/mid-new/package-lock.json ]; then
            echo "::error::Die ZIP enthält keine package-lock.json im Hauptverzeichnis."
            exit 1
          fi

          echo "MID-Archiv wurde erfolgreich geprüft und entpackt."

      - name: Alte MID-Version ersetzen
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='MID-professional-replacement.zip' \
            /tmp/mid-new/ ./

          rm -f MID-professional-replacement.zip

          echo "MID-Projekt wurde ersetzt."
          echo "Die mitgelieferte package-lock.json bleibt erhalten."

      - name: npm-Netzwerkzugriff prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail

          npm config set fetch-retries 2
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 3000
          npm config set fetch-retry-maxtimeout 15000
          npm config set fetch-timeout 30000

          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Registry: $(npm config get registry)"
          echo "Cache: $(npm config get cache)"

          echo "Prüfe Erreichbarkeit des npm-Registrys …"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 30 \
            https://registry.npmjs.org/-/ping

          echo
          echo "npm-Registry ist erreichbar."

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        timeout-minutes: 7
        run: |
          set -uo pipefail

          run_npm_ci() {
            local max_seconds=150
            local elapsed=0
            local status=0

            echo "Starte npm ci in eigener Prozessgruppe …"

            setsid npm ci \
              --no-audit \
              --no-fund \
              --prefer-offline \
              --legacy-peer-deps \
              --ignore-scripts \
              --loglevel=notice &

            local npm_pid=$!
            local process_group=$npm_pid

            echo "npm-PID: ${npm_pid}"
            echo "Maximale Laufzeit: ${max_seconds} Sekunden"

            while kill -0 "$npm_pid" 2>/dev/null; do
              sleep 15
              elapsed=$((elapsed + 15))

              echo "npm ci läuft – ${elapsed}/${max_seconds} Sekunden"

              if [ "$elapsed" -ge "$max_seconds" ]; then
                echo "::warning::npm ci überschreitet ${max_seconds} Sekunden."
                echo "Beende die vollständige npm-Prozessgruppe ${process_group}."

                kill -TERM -- "-${process_group}" 2>/dev/null || true
                sleep 5
                kill -KILL -- "-${process_group}" 2>/dev/null || true

                wait "$npm_pid" 2>/dev/null || true
                return 124
              fi
            done

            wait "$npm_pid"
            status=$?

            return "$status"
          }

          for attempt in 1 2; do
            echo
            echo "===== npm-ci-Versuch ${attempt} von 2 ====="

            if run_npm_ci; then
              echo "npm ci wurde erfolgreich abgeschlossen."
              npm ls --depth=0
              exit 0
            fi

            status=$?
            echo "::warning::npm ci ist mit Status ${status} fehlgeschlagen."

            if [ "$attempt" -eq 2 ]; then
              echo "::error::npm ci ist nach zwei Versuchen fehlgeschlagen."
              exit 1
            fi

            echo "Bereite zweiten Versuch vor …"
            rm -rf node_modules
            npm cache verify || true
            sleep 10
          done

      - name: Produktionsbuild ausführen
        shell: bash
        timeout-minutes: 8
        run: |
          set -euo pipefail
          npm run build

      - name: Worker-Syntax prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail
          node --check worker/metar-proxy.js

      - name: MID-Regressionstests ausführen
        shell: bash
        timeout-minutes: 15
        run: |
          set -euo pipefail

          mapfile -t TEST_SCRIPTS < <(
            node -e "
              const scripts = require('./package.json').scripts ?? {};
              for (const name of Object.keys(scripts)) {
                if (name.startsWith('test:')) console.log(name);
              }
            "
          )

          if [ "${#TEST_SCRIPTS[@]}" -eq 0 ]; then
            echo "::error::Keine MID-Regressionstests gefunden."
            exit 1
          fi

          for script in "${TEST_SCRIPTS[@]}"; do
            echo
            echo "===== npm run ${script} ====="

            if ! timeout \
              --signal=TERM \
              --kill-after=10s \
              2m \
              npm run "$script"
            then
              status=$?
              echo "::error::Der Test ${script} ist mit Status ${status} fehlgeschlagen."
              exit "$status"
            fi
          done

          echo
          echo "Alle MID-Regressionstests wurden erfolgreich ausgeführt."

      - name: Neue MID-Version committen
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Keine Änderungen vorhanden."
          else
            git commit -m "Replace MID with professional dashboard"
            git push origin main
          fi
