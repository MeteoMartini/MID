name: Install MID release and deploy
run-name: MID-Release aus ZIP installieren und veröffentlichen

on:
  push:
    branches:
      - main
    paths:
      - MID-professional-replacement.zip

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: mid-install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install_build:
    name: MID installieren, prüfen und bauen
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository laden
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Release-ZIP sicher entpacken
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          archive="MID-professional-replacement.zip"
          target="/tmp/mid-new"

          if [ ! -f "$archive" ]; then
            echo "::error::${archive} wurde nicht im Repository-Hauptverzeichnis gefunden."
            exit 1
          fi

          rm -rf "$target"
          mkdir -p "$target"

          ARCHIVE="$archive" TARGET="$target" python3 - <<'PY'
          import os
          import stat
          from pathlib import Path
          from zipfile import ZipFile

          archive = Path(os.environ["ARCHIVE"])
          target = Path(os.environ["TARGET"]).resolve()

          with ZipFile(archive) as zip_file:
              for entry in zip_file.infolist():
                  relative = Path(entry.filename)

                  if relative.is_absolute() or ".." in relative.parts:
                      raise SystemExit(
                          f"Unsicherer ZIP-Pfad: {entry.filename}"
                      )

                  mode = entry.external_attr >> 16

                  if stat.S_ISLNK(mode):
                      raise SystemExit(
                          f"Links sind im Release-ZIP nicht zulässig: "
                          f"{entry.filename}"
                      )

                  destination = (target / relative).resolve()

                  if target != destination and target not in destination.parents:
                      raise SystemExit(
                          f"ZIP-Pfad verlässt das Zielverzeichnis: "
                          f"{entry.filename}"
                      )

              zip_file.extractall(target)
          PY

          for required in package.json package-lock.json src worker public; do
            if [ ! -e "$target/$required" ]; then
              echo "::error::Im Hauptverzeichnis der ZIP fehlt: ${required}"
              exit 1
            fi
          done

          echo "Release-ZIP wurde sicher entpackt und strukturell geprüft."

      - name: Alte MID-Version ersetzen
        shell: bash
        timeout-minutes: 3
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='MID-professional-replacement.zip' \
            /tmp/mid-new/ ./

          rm -f MID-professional-replacement.zip

          echo "MID-Projektdateien wurden ersetzt."
          echo "Die Repository-Workflows bleiben erhalten."

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Lockfile und npm-Registry prüfen
        shell: bash
        timeout-minutes: 2
        run: |
          set -euo pipefail

          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 2
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 3000
          npm config set fetch-retry-maxtimeout 15000
          npm config set fetch-timeout 60000

          node <<'NODE'
          const fs = require("node:fs");

          const lock = JSON.parse(
            fs.readFileSync("package-lock.json", "utf8")
          );

          const invalid = [];

          for (const [name, entry] of Object.entries(lock.packages ?? {})) {
            const resolved =
              entry && typeof entry === "object"
                ? entry.resolved
                : undefined;

            if (typeof resolved !== "string") {
              continue;
            }

            if (
              /internal\.api\.openai\.org|applied-caas-gateway|localhost|127\.0\.0\.1/i
                .test(resolved)
            ) {
              invalid.push(
                `${name || "(root)"}: ${resolved}`
              );
            }
          }

          if (invalid.length) {
            console.error(
              "Nicht öffentlich erreichbare Paket-URLs im Lockfile:\n" +
              invalid.join("\n")
            );

            process.exit(1);
          }

          console.log(
            "Lockfile enthält keine internen oder lokalen Paket-URLs."
          );
          NODE

          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Registry: $(npm config get registry)"

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        timeout-minutes: 6
        run: |
          set -euo pipefail

          npm ci \
            --no-audit \
            --no-fund \
            --prefer-offline \
            --legacy-peer-deps \
            --loglevel=notice

      - name: Produktionsbuild und Regressionstests ausführen
        shell: bash
        timeout-minutes: 15
        env:
          VITE_METAR_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}
          VITE_ALERT_PROXY_URL: ${{ vars.VITE_ALERT_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_RADAR_PROXY_URL: ${{ vars.VITE_RADAR_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_WORKER_SAME_ORIGIN_PATH: ${{ vars.VITE_WORKER_SAME_ORIGIN_PATH }}
          VITE_WORKER_FALLBACK_URLS: ${{ vars.VITE_WORKER_FALLBACK_URLS }}
        run: |
          set -euo pipefail
          npm run verify

      - name: Neue MID-Version committen
        id: commit
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "::error::Das Release-ZIP führte zu keinen installierbaren Änderungen."
            exit 1
          fi

          version=$(node -p "require('./package.json').version")

          git commit -m "Install MID v${version}"
          git push origin HEAD:main

          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Produktionsbuild für Pages hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: MID auf GitHub Pages veröffentlichen
    needs: install_build
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: mid-pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub-Pages-Deployment ausführen
        id: deployment
        uses: actions/deploy-pages@v5
