name: Apply MID private analytics
run-name: MID v0.7.90.5 – private Zugriffsauswertung einspielen

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: mid-private-analytics
  cancel-in-progress: false

jobs:
  patch_build:
    name: MID patchen, prüfen und bauen
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository laden
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 22 mit npm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Private Zugriffsauswertung einspielen
        shell: bash
        env:
          MID_ANALYTICS_TOKEN: ${{ vars.VITE_CLOUDFLARE_ANALYTICS_TOKEN }}
        run: |
          set -euo pipefail
          cat > /tmp/apply-private-analytics.py <<'PY'
          #!/usr/bin/env python3
          from pathlib import Path
          import json
          import os
          import re

          ROOT=Path.cwd()
          FROM_VERSION='0.7.90.4'
          TO_VERSION='0.7.90.5'
          ANALYTICS_TS=r"""const CLOUDFLARE_BEACON_URL='https://static.cloudflareinsights.com/beacon.min.js';
          const INTERNAL_DEVICE_KEY='mid.analytics.internal-device';
          const CONTROL_PARAMETER='mid-analytics';
          const CONFIG_FILE='analytics-config.json';

          type AnalyticsStatus={
           enabled:boolean;
           reason:'loaded'|'already-loaded'|'internal-device'|'development'|'missing-token'|'unsupported'|'config-error';
          };

          function validToken(value:unknown){
           const token=String(value||'').trim();
           return /^[A-Za-z0-9_-]{20,128}$/.test(token)?token:'';
          }

          function removeControlParameter(url:URL){
           url.searchParams.delete(CONTROL_PARAMETER);
           const next=`${url.pathname}${url.search}${url.hash}`;
           window.history.replaceState(window.history.state,'',next);
          }

          function isInternalDevice(){
           const url=new URL(window.location.href);
           const command=(url.searchParams.get(CONTROL_PARAMETER)||'').trim().toLowerCase();
           let internal=false;
           try{
            if(command==='internal'||command==='exclude'){
             localStorage.setItem(INTERNAL_DEVICE_KEY,'1');
             internal=true;
            }else if(command==='external'||command==='include'||command==='reset'){
             localStorage.removeItem(INTERNAL_DEVICE_KEY);
            }else{
             internal=localStorage.getItem(INTERNAL_DEVICE_KEY)==='1';
            }
           }catch{
            internal=command==='internal'||command==='exclude';
           }
           if(command)removeControlParameter(url);
           return internal;
          }

          async function analyticsToken(){
           const buildToken=validToken(import.meta.env.VITE_CLOUDFLARE_ANALYTICS_TOKEN);
           if(buildToken)return buildToken;
           const configUrl=new URL(CONFIG_FILE,document.baseURI);
           const response=await fetch(configUrl,{cache:'no-store',credentials:'same-origin'});
           if(!response.ok)return'';
           const config=await response.json() as {token?:unknown};
           return validToken(config.token);
          }

          export async function initPrivateWebAnalytics():Promise<AnalyticsStatus>{
           if(typeof window==='undefined'||typeof document==='undefined')return{enabled:false,reason:'unsupported'};
           if(isInternalDevice())return{enabled:false,reason:'internal-device'};
           if(!import.meta.env.PROD)return{enabled:false,reason:'development'};
           let token='';
           try{token=await analyticsToken()}catch{return{enabled:false,reason:'config-error'}}
           if(!token)return{enabled:false,reason:'missing-token'};
           const existing=document.querySelector<HTMLScriptElement>(`script[src^="${CLOUDFLARE_BEACON_URL}"]`);
           if(existing)return{enabled:true,reason:'already-loaded'};
           const script=document.createElement('script');
           script.type='module';
           script.src=CLOUDFLARE_BEACON_URL;
           script.setAttribute('data-cf-beacon',JSON.stringify({token,spa:true}));
           script.setAttribute('data-mid-analytics','cloudflare');
           document.head.appendChild(script);
           return{enabled:true,reason:'loaded'};
          }"""
          TEST_MJS=r"""import {readFile} from 'node:fs/promises';

          const read=path=>readFile(new URL(path,import.meta.url),'utf8');
          const [analytics,main,pkg,config,documentation]=await Promise.all([
           read('../src/analytics.ts'),
           read('../src/main.tsx'),
           read('../package.json'),
           read('../public/analytics-config.json'),
           read('../docs/private-analytics.md')
          ]);
          const failures=[];
          for(const token of [
           'https://static.cloudflareinsights.com/beacon.min.js',
           "const CONFIG_FILE='analytics-config.json'",
           "const INTERNAL_DEVICE_KEY='mid.analytics.internal-device'",
           "const CONTROL_PARAMETER='mid-analytics'",
           "fetch(configUrl,{cache:'no-store',credentials:'same-origin'})",
           "script.type='module'",
           "JSON.stringify({token,spa:true})",
           "window.history.replaceState",
           "if(!import.meta.env.PROD)",
           "reason:'missing-token'"
          ]){
           if(!analytics.includes(token))failures.push(`Analytics-Integration unvollständig: ${token}`);
          }
          if(!main.includes("import {initPrivateWebAnalytics} from './analytics';"))failures.push('Analytics-Initialisierung ist nicht in main.tsx importiert');
          const initIndex=main.indexOf('void initPrivateWebAnalytics();');
          const restoreIndex=main.indexOf('await restorePersistentState();');
          if(initIndex<0||restoreIndex<0||initIndex>restoreIndex)failures.push('Analytics-Kontrolle läuft nicht vor der Wiederherstellung des App-Zustands');
          const packageJson=JSON.parse(pkg);
          if(packageJson.scripts?.['test:private-analytics']!=='node scripts/test-private-analytics.mjs')failures.push('Analytics-Regressionstest fehlt in package.json');
          if(!String(packageJson.scripts?.verify||'').includes('npm run test:private-analytics'))failures.push('Analytics-Regressionstest fehlt in der Gesamtprüfung');
          let configJson;
          try{configJson=JSON.parse(config)}catch{failures.push('analytics-config.json ist kein gültiges JSON')}
          const configuredToken=String(configJson?.token||'').trim();
          if(configuredToken&&!/^[A-Za-z0-9_-]{20,128}$/.test(configuredToken))failures.push('Analytics-Site-Token hat ein ungültiges Format');
          for(const token of ['Cloudflare-Einfügung deaktivieren','?mid-analytics=internal','?mid-analytics=external','analytics-config.json']){
           if(!documentation.includes(token))failures.push(`Analytics-Dokumentation unvollständig: ${token}`);
          }
          if(failures.length){
           console.error(`Private-Analytics-Prüfung fehlgeschlagen:\n- ${failures.join('\n- ')}`);
           process.exit(1);
          }
          console.log('Private Zugriffsauswertung geprüft: Laufzeitkonfiguration, lokale Geräteausnahme, Cloudflare-Beacon und Dokumentation sind vorhanden.');"""
          DOCS_MD=r"""# Private Zugriffsauswertung in MID

          MID lädt Cloudflare Web Analytics ausschließlich im Produktionsbetrieb. Die
          öffentliche Site-Kennung wird aus `public/analytics-config.json` gelesen. Fehlt
          dort ein gültiger Token, wird keine Verbindung zum Analytics-Beacon aufgebaut.

          ## Cloudflare vorbereiten

          1. In Cloudflare **Web Analytics** öffnen und die öffentliche MID-Adresse als
             Website hinzufügen.
          2. Bei einer über Cloudflare geleiteten Domain die **automatische
             Cloudflare-Einfügung deaktivieren** und die manuelle JS-Snippet-Installation
             wählen. Andernfalls könnte Cloudflare den Beacon schon vor der lokalen
             MID-Ausnahme einfügen.
          3. Aus dem angezeigten Snippet nur den Wert hinter `"token"` kopieren.
          4. In GitHub unter **Repository → Settings → Secrets and variables → Actions →
             Variables** die Repository-Variable
             `VITE_CLOUDFLARE_ANALYTICS_TOKEN` anlegen.
          5. Den einmaligen Installationsworkflow starten. Er schreibt die Site-Kennung
             als `public/analytics-config.json` in das MID-Release.

          Der Site-Token ist keine geheime Zugangsberechtigung. Er ist Bestandteil des
          öffentlich ausgelieferten Cloudflare-Beacon-Snippets. Die Auswertung selbst
          bleibt ausschließlich im geschützten Cloudflare-Konto.

          ## Eigene Geräte ausschließen

          Auf jedem eigenen Browser beziehungsweise jeder installierten MID-PWA einmal
          folgende Adresse aufrufen:

          ```text
          https://DEINE-MID-ADRESSE/?mid-analytics=internal
          ```

          MID speichert die Ausnahme lokal für diesen Browser und entfernt den
          Steuerparameter sofort wieder aus der sichtbaren Adresse. Von diesem Browser
          wird der Cloudflare-Beacon anschließend nicht mehr geladen.

          Die Zählung lässt sich auf einem Gerät wieder aktivieren mit:

          ```text
          https://DEINE-MID-ADRESSE/?mid-analytics=external
          ```

          Die Kennzeichnung ist geräte- und browserbezogen. Sie muss auf iPhone, iPad,
          Desktop-Browser und einer installierten PWA jeweils separat gesetzt werden.

          ## Datenschutz und Grenzen

          - MID setzt für diese Funktion selbst keine Cookies.
          - In lokaler Entwicklung wird der Beacon grundsätzlich nicht geladen.
          - Fehlt der Token oder ist er formal ungültig, bleibt Analytics vollständig aus.
          - Inhaltsblocker können JavaScript-basierte Besuche aus der Statistik entfernen.
          - Es gibt in MID keine öffentliche Statistikseite und keinen Besucherzähler."""

          def read(path):
              return (ROOT/path).read_text(encoding='utf-8')

          def write(path,content):
              target=ROOT/path
              target.parent.mkdir(parents=True,exist_ok=True)
              target.write_text(content,encoding='utf-8')

          def replace_once(path,old,new):
              content=read(path)
              if new in content:
                  return
              if old not in content:
                  raise RuntimeError(f'{path}: erwarteter Ausgangstext nicht gefunden')
              write(path,content.replace(old,new,1))

          package_path=ROOT/'package.json'
          if not package_path.exists():
              raise SystemExit('package.json wurde nicht gefunden.')
          package=json.loads(package_path.read_text(encoding='utf-8'))
          current=str(package.get('version') or '')
          if current not in {FROM_VERSION,TO_VERSION}:
              raise SystemExit(f'Abbruch: erwartet wird MID v{FROM_VERSION} oder v{TO_VERSION}, gefunden wurde v{current}.')

          raw_token=str(os.environ.get('MID_ANALYTICS_TOKEN','')).strip()
          token=raw_token if re.fullmatch(r'[A-Za-z0-9_-]{20,128}',raw_token) else ''
          if raw_token and not token:
              raise SystemExit('VITE_CLOUDFLARE_ANALYTICS_TOKEN besitzt kein gültiges Format.')

          write('src/analytics.ts',ANALYTICS_TS)
          write('scripts/test-private-analytics.mjs',TEST_MJS)
          write('docs/private-analytics.md',DOCS_MD)
          write('public/analytics-config.json',json.dumps({'token':token},indent=2)+'\n')

          replace_once(
              'src/main.tsx',
              "import {markMidRuntimeHealthy,registerMidServiceWorker} from './pwa';",
              "import {markMidRuntimeHealthy,registerMidServiceWorker} from './pwa';\nimport {initPrivateWebAnalytics} from './analytics';"
          )
          replace_once(
              'src/main.tsx',
              "async function start(){\n await restorePersistentState();",
              "async function start(){\n void initPrivateWebAnalytics();\n await restorePersistentState();"
          )

          package['version']=TO_VERSION
          scripts=package.setdefault('scripts',{})
          scripts['test:private-analytics']='node scripts/test-private-analytics.mjs'
          verify=str(scripts.get('verify',''))
          if 'npm run test:private-analytics' not in verify:
              scripts['verify']=verify+' && npm run test:private-analytics'
          write('package.json',json.dumps(package,ensure_ascii=False,indent=2)+'\n')

          lock=json.loads(read('package-lock.json'))
          lock['version']=TO_VERSION
          lock.setdefault('packages',{}).setdefault('',{})['version']=TO_VERSION
          write('package-lock.json',json.dumps(lock,ensure_ascii=False,indent=2)+'\n')

          write('src/version.ts',f"export const MID_VERSION='{TO_VERSION}';\n")
          write('public/version.json',json.dumps({'version':TO_VERSION},indent=2)+'\n')

          for path in ['public/service-worker.js','public/sw.js']:
              content=read(path)
              content=re.sub(r"const CACHE='mid-shell-v[^']+';",f"const CACHE='mid-shell-v{TO_VERSION}';",content,count=1)
              write(path,content)
          worker=read('worker/metar-proxy.js')
          worker=re.sub(r"const WORKER_VERSION='[^']+';",f"const WORKER_VERSION='{TO_VERSION}';",worker,count=1)
          write('worker/metar-proxy.js',worker)

          readme_heading=f'## Wartung in v{TO_VERSION} – Private Zugriffsauswertung'
          readme=read('README.md')
          if readme_heading not in readme:
              readme=f"""## Wartung in v{TO_VERSION} – Private Zugriffsauswertung

          - Private Cloudflare-Web-Analytics-Integration ergänzt; ohne konfigurierte Site-ID wird keinerlei Beacon geladen.
          - Eigene Browser und installierte PWAs lassen sich lokal per `?mid-analytics=internal` dauerhaft von der Zählung ausschließen.
          - `?mid-analytics=external` hebt die lokale Ausnahme wieder auf.
          - Die öffentliche Site-Kennung liegt in `public/analytics-config.json`; vorhandene Deployment-Workflows müssen nicht verändert werden.
          - Neuer Regressionstest und ausführliche Einrichtungsdokumentation ergänzt.
          - Cloudflare Worker ohne funktionale Änderung.

          """+readme
          readme=re.sub(r'\*\*Aktuelle Version: v0\.7\.90\.(?:4|5)\*\*',f'**Aktuelle Version: v{TO_VERSION}**',readme,count=1)
          write('README.md',readme)

          changelog_heading=f'# MID v{TO_VERSION}'
          changelog=read('CHANGELOG.md')
          if changelog_heading not in changelog:
              changelog=f"""# MID v{TO_VERSION}

          - Private, nicht öffentlich einsehbare Zugriffsauswertung über Cloudflare Web Analytics ergänzt.
          - Die Site-Kennung wird als öffentliche Laufzeitkonfiguration geladen, sodass bestehende GitHub-Workflowdateien unverändert bleiben.
          - Eigene Geräte können sich über `?mid-analytics=internal` lokal von der Erfassung ausschließen; `?mid-analytics=external` aktiviert die Zählung wieder.
          - Entwicklung, fehlende oder ungültige IDs bleiben vollständig ohne Analytics-Aufruf.
          - Regressionstest, Dokumentation und Versionssynchronisierung ergänzt.
          - Cloudflare Worker ohne funktionale Änderung.

          """+changelog
          write('CHANGELOG.md',changelog)

          print(f'MID v{TO_VERSION} wurde für private Zugriffsauswertung vorbereitet.')
          print('Cloudflare-Site-Token:', 'konfiguriert' if token else 'nicht gesetzt – Analytics bleibt inaktiv')
          PY
          python3 /tmp/apply-private-analytics.py

      - name: Abhängigkeiten reproduzierbar installieren
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/
          npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps

      - name: Produktionsbuild und vollständige Regressionstests
        shell: bash
        timeout-minutes: 18
        env:
          VITE_METAR_PROXY_URL: ${{ vars.VITE_METAR_PROXY_URL }}
          VITE_ALERT_PROXY_URL: ${{ vars.VITE_ALERT_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_RADAR_PROXY_URL: ${{ vars.VITE_RADAR_PROXY_URL || vars.VITE_METAR_PROXY_URL }}
          VITE_WORKER_SAME_ORIGIN_PATH: ${{ vars.VITE_WORKER_SAME_ORIGIN_PATH }}
          VITE_WORKER_FALLBACK_URLS: ${{ vars.VITE_WORKER_FALLBACK_URLS }}
        run: |
          set -euo pipefail
          npm run verify

      - name: MID v0.7.90.5 committen
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows'
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine neuen Projektänderungen; der geprüfte Stand wird erneut veröffentlicht."
          else
            git commit -m "Install MID v0.7.90.5"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Produktionsbuild hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: MID v0.7.90.5 veröffentlichen
    needs: patch_build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub-Pages-Deployment ausführen
        id: deployment
        uses: actions/deploy-pages@v5
