<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07111f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MID">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./mid-logo.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/png" href="./mid-logo.png">
  <title>MID - Meteorological Information Dashboard</title>
  <style>
    #mid-boot-fallback{box-sizing:border-box;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#edf3f8;color:#15263b;font:500 16px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #mid-boot-card{width:min(460px,100%);padding:24px;border:1px solid #cad7e3;border-radius:22px;background:rgba(255,255,255,.92);box-shadow:0 18px 60px rgba(23,44,66,.16);text-align:center}
    #mid-boot-card strong{display:block;margin-bottom:7px;font-size:21px}#mid-boot-card small{display:block;color:#64768a}#mid-boot-repair{display:none;margin:18px auto 0;padding:10px 15px;border:0;border-radius:12px;background:#1687c9;color:#fff;font:700 14px system-ui;cursor:pointer}
    html[data-theme="dark"] #mid-boot-fallback{background:#07111f;color:#e8f1fa}html[data-theme="dark"] #mid-boot-card{border-color:#2a3b4d;background:#111e2c;box-shadow:0 18px 60px rgba(0,0,0,.35)}html[data-theme="dark"] #mid-boot-card small{color:#9eb0c2}
  </style>
  <script>
    (function(){try{var saved=localStorage.getItem('theme'),dark=saved==='dark'||(saved!=='light'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches),theme=dark?'dark':'light',mode=saved==='dark'||saved==='light'||saved==='auto'?saved:'auto';document.documentElement.dataset.theme=theme;document.documentElement.dataset.themeMode=mode;var meta=document.querySelector('meta[name="theme-color"]');if(meta)meta.setAttribute('content',dark?'#07111f':'#edf3f8')}catch(e){}})();
  </script>
</head>
<body>
  <div id="root"><div id="mid-boot-fallback"><div id="mid-boot-card"><strong>MID wird geladen …</strong><small id="mid-boot-status">Die Wetterdaten und die Oberfläche werden vorbereitet.</small><button id="mid-boot-repair" type="button">MID-Cache reparieren und neu laden</button></div></div></div>
  <script>
    (function(){
      var ready=false,recovering=false,timer;
      function cleanRecoveryQuery(){try{var url=new URL(location.href);if(!url.searchParams.has('mid-recovery'))return;url.searchParams.delete('mid-recovery');history.replaceState(history.state,'',url.toString())}catch(e){}}
      function showRecovery(message){var status=document.getElementById('mid-boot-status'),button=document.getElementById('mid-boot-repair');if(!status||!button){var overlay=document.createElement('div');overlay.id='mid-boot-fallback';overlay.style.cssText='position:fixed;inset:0;z-index:99999';overlay.innerHTML='<div id="mid-boot-card"><strong>MID benötigt eine Reparatur</strong><small id="mid-boot-status"></small><button id="mid-boot-repair" type="button">MID-Cache reparieren und neu laden</button></div>';document.body.appendChild(overlay);status=document.getElementById('mid-boot-status');button=document.getElementById('mid-boot-repair')}if(status)status.textContent=message||'Der Start dauert ungewöhnlich lange. Der lokale MID-Cache kann sicher repariert werden.';if(button)button.style.display='inline-block'}
      async function recover(auto){if(recovering)return;recovering=true;var key='mid:boot-recovery',last=0;try{last=Number(sessionStorage.getItem(key)||0)}catch(e){}if(auto&&Date.now()-last<120000){recovering=false;showRecovery('Die automatische Reparatur wurde bereits versucht. Bitte die Reparatur manuell erneut starten.');return}try{sessionStorage.setItem(key,String(Date.now()))}catch(e){}showRecovery('MID-Cache wird repariert …');try{if('serviceWorker'in navigator){var registrations=await navigator.serviceWorker.getRegistrations();await Promise.all(registrations.map(function(registration){return registration.unregister()}))}if('caches'in window){var names=await caches.keys();await Promise.all(names.filter(function(name){return name.indexOf('mid-shell-v')===0}).map(function(name){return caches.delete(name)}))}}catch(e){}var url=new URL(location.href);url.searchParams.set('mid-recovery',String(Date.now()));location.replace(url.toString())}
      window.__MID_MARK_READY__=function(){ready=true;window.clearTimeout(timer);cleanRecoveryQuery();try{sessionStorage.removeItem('mid:boot-recovery')}catch(e){}};
      window.__MID_SHOW_RECOVERY__=showRecovery;
      window.__MID_RECOVER__=recover;
      timer=window.setTimeout(function(){if(!ready)showRecovery()},12000);
      document.addEventListener('click',function(event){if(event.target&&event.target.id==='mid-boot-repair')recover(false)});
      function moduleFailure(value){return /failed to fetch dynamically imported module|importing a module script failed|loading chunk|module script|unexpected token.*</i.test(String(value||''))}
      window.addEventListener('error',function(event){var target=event.target,isModuleTarget=target&&target.tagName==='SCRIPT'&&(target.type==='module'||String(target.src||'').indexOf('/assets/')>=0);if(isModuleTarget||moduleFailure(event.message||event.error)){showRecovery('Eine Update-Datei konnte nicht geladen werden. MID repariert den Cache einmalig.');window.setTimeout(function(){recover(true)},700)}},true);
      window.addEventListener('unhandledrejection',function(event){if(moduleFailure(event.reason&&event.reason.message||event.reason)){showRecovery('Eine Update-Datei konnte nicht geladen werden. MID repariert den Cache einmalig.');window.setTimeout(function(){recover(true)},700)}});
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
